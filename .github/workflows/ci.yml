name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  GO_VERSION: 1.26.1
  GOTOOLCHAIN: go1.26.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
